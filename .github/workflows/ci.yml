name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run basic tests
        run: |
          python -c "from src.factory import SifrelemeFactory; s=SifrelemeFactory.create('basit'); assert s.sifrele('a') == 'b'"
          echo "All tests passed"
