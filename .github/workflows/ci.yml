name: CI

on:
  push:
    branches: [ main, phase-1, phase-2, phase-3 ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Check syntax and imports
      run: |
        python -m py_compile src/*.py
    - name: Test Factory
      run: |
        python -c "from src.factory import SifrelemeFactory; s = SifrelemeFactory.create('basit'); assert s.sifrele('a') == 'b'"
    - name: Test Strategy
      run: |
        python -c "from src.strategy import BasitStrateji; s = BasitStrateji(); assert s.sifrele('a') == 'b'"
