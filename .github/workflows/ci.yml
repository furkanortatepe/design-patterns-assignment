name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: List files for debugging
        run: ls -la
      - name: Test Factory Method
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from SRC.factory import SifrelemeFactory; s = SifrelemeFactory.create('basit'); assert s.sifrele('a') == 'b'"
