name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies (if any)
        run: |
          # Gerekirse pip install -r requirements.txt
          echo "No dependencies"
      - name: Test Factory Method
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from src.factory import SifrelemeFactory; s = SifrelemeFactory.create('basit'); assert s.sifrele('a') == 'b'"
      - name: Test Strategy
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from src.strategy import BasitStrateji; s = BasitStrateji(); assert s.sifrele('a') == 'b'"
